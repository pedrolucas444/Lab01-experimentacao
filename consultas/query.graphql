query ($cursor: String) {
  search(query: "stars:>1000 sort:stars-desc", type: REPOSITORY, first: 10, after: $cursor) {
    pageInfo {
      hasNextPage
      endCursor
    }
    nodes {
      ... on Repository {

        name

        owner {
          login
        }

        stargazerCount

        createdAt
        updatedAt

        primaryLanguage {
          name
        }

        pullRequests(states: MERGED) {
          totalCount
        }

        releases {
          totalCount
        }

        openIssues: issues(states: OPEN) {
          totalCount
        }

        closedIssues: issues(states: CLOSED) {
          totalCount
        }

      }
    }
  }
}